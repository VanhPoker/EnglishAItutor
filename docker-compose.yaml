services:
  # --- LiveKit Server ---
  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"   # WebSocket
      - "7881:7881"   # HTTP API
      - "7882:7882/udp"  # WebRTC/UDP
    environment:
      - LIVEKIT_KEYS=devkey: secret

  # --- PostgreSQL + pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: english_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Backend: FastAPI Helper ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uvicorn", "app.helper_api:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  # --- Backend: LiveKit Agent Worker ---
  agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.main", "dev"]
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - livekit
      - postgres

volumes:
  pgdata:
